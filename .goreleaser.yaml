# GoReleaser config for the mermaid CLI.
# https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mermaid
    main: ./cmd/mermaid
    binary: mermaid
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
